name: "Setup mise tools"
description: "Cache and install mise tools with rate limit handling"

runs:
  using: "composite"
  steps:
    - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
      with:
        key: ${{ runner.os }}-${{ runner.arch }}-mise-tools-${{ hashFiles('mise.lock') }}
        restore-keys: ${{ runner.os }}-${{ runner.arch }}-mise-tools-
        path: |
          ~/.local/share/mise
          ~/.cache/mise
    - run: mise x wait-for-gh-rate-limit -- wait-for-gh-rate-limit
      shell: bash
    - run: mise install
      shell: bash
